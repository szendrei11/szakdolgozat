<section>
  <mat-grid-list cols="3">
    <mat-grid-tile colspan="3">
      <mat-card>
        <mat-card-header color="primary">
          <mat-card-title>Signup Form</mat-card-title>
        </mat-card-header>
        <form [formGroup]="signupForm" (ngSubmit)="registerUser()">
          <mat-form-field style="width: 400px !important">
            <mat-label>Name</mat-label>
            <input required formControlName="name" matInput />
          </mat-form-field>
          <br />
          <mat-form-field style="width: 400px !important">
            <mat-label>Email</mat-label>
            <input required formControlName="email" matInput />
          </mat-form-field>
          <br />
          <mat-form-field style="width: 400px !important">
            <mat-label>Password</mat-label>
            <input
              type="password"
              formControlName="password"
              required
              matInput
            />
          </mat-form-field>
          <br />
          <button mat-raised-button matbutton color="primary">Submit</button>
        </form>
      </mat-card>
    </mat-grid-tile>
  </mat-grid-list>
</section>
